services:
  mongo:
    image: mongo:8
    container_name: portfolio-mongo
    restart: always
    environment:
      MONGO_INITDB_ROOT_USERNAME: ${MONGO_USER}
      MONGO_INITDB_ROOT_PASSWORD: ${MONGO_PASSWORD}
      MONGO_INITDB_DATABASE: ${MONGO_DATABASE}
    volumes:
      - mongo_data:/data/db
    networks:
      - proxy

  backend:
    build: ./backend
    container_name: portfolio-backend
    restart: always
    env_file:
      - ./backend/.env
    ports:
      - "127.0.0.1:3000:3000"
    volumes:
      - uploads_data:/app/uploads
    depends_on:
      - mongo
    networks:
      - proxy

  frontend:
    build: ./Frontend
    container_name: portfolio-frontend
    restart: always
    ports:
      - "127.0.0.1:4173:4173"
    depends_on:
      - backend
    networks:
      - proxy

networks:
  proxy:
    external: true

volumes:
  mongo_data:
    name: react-portfolio_mongo_data
  uploads_data:
    name: react-portfolio_uploads
