name: Build and Publish to Docker Hub

on:
  push:
    branches: 
      - main
  workflow_dispatch:

env:
  DOCKER_IMAGE_REPO: git.literalok.com/roli1215/portfolio

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout code
        uses: actions/checkout@v3

      - name: Set build date
        run: echo "BUILD_TIME=$(date '+%Y%m%d_%H%m%S')" >> $GITHUB_ENV

      - name: Build the Docker image
        run: docker build . --file Dockerfile --tag $DOCKER_IMAGE_REPO:latest

      - name: Log in to Docker Registry
        run: docker login -u "${{ secrets.DOCKER_USERNAME }}" -p "${{ secrets.DOCKER_PASSWORD }}" git.literalok.com

      - name: Create image tags
        run: |
          docker image tag $DOCKER_IMAGE_REPO:latest $DOCKER_IMAGE_REPO:${GITHUB_SHA::7}
          docker image tag $DOCKER_IMAGE_REPO:latest $DOCKER_IMAGE_REPO:${BUILD_TIME}          

      - name: Push Docker image to Docker Hub
        run: |
          docker push $DOCKER_IMAGE_REPO:latest
          docker push $DOCKER_IMAGE_REPO:${GITHUB_SHA::7}
          docker push $DOCKER_IMAGE_REPO:${BUILD_TIME}          
  trigger_deploy:
    runs-on: ubuntu-latest
    needs:
      - build
    steps:
      - name: Checkout code
        uses: actions/checkout@v2

      - name: Setup SSH key
        run: |
          mkdir -p ~/.ssh
          echo "${{ secrets.SSH_KEY }}" > ~/.ssh/id_rsa
          chmod 600 ~/.ssh/id_rsa          

      - name: Add remote server to known hosts
        run: |
          ssh-keyscan -H ${{ secrets.SSH_HOSTNAME }} >> ~/.ssh/known_hosts          

      - name: Deploy via SSH
        run: |
          ssh ${{ secrets.SSH_USERNAME }}@${{ secrets.SSH_HOSTNAME }} "cd /srv/portfolio && docker compose up -d"          
  
